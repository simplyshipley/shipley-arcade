<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#15110e">
  <title>🌿 Budshop Runner</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #15110e;            /* dark letterbox */
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: #d8c8a8;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Landscape runner canvas: 800x360. Scales to fit the screen, stays
       landscape on phones. Dark letterbox via the giant box-shadow.
       touch-action:none so tap-to-jump + swipe-down never scroll/zoom. */
    #game {
      display: block;
      touch-action: none;
      background: #bfe3f2;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      image-rendering: optimizeQuality;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px #15110e, 0 0 60px rgba(124, 196, 92, 0.18);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="800" height="360"></canvas>
  </div>

  <!-- LOGIC (sibling builder): pure rules, no DOM. entities.js exposes
       window.BudEntities (the data-driven roster); core.js exposes
       window.BudCore (Runner physics, ScoreKeeper harvest-combo, seeded
       fair-gap Spawner, makeRng, speedAt, collides, shareText, best-score
       model + config) and consumes the roster. entities.js FIRST so
       window.BudEntities exists when core.js reads it; then core.js. The
       shell reads all config from BudCore — it never hard-codes physics. -->
  <script src="src/entities.js"></script>
  <script src="src/core.js"></script>
  <!-- SOUND: zero-dep synthesized SFX. Loaded before game.js; armed below. -->
  <script src="src/sfx.js"></script>
  <!-- SHELL: cel-cartoon renderer + input + screens (consumes BudCore state). -->
  <script src="src/game.js"></script>
  <script>window.SFX && window.SFX.arm(window);</script>
  <!-- MOBILE: vendored control layer. Init AFTER game.js so the canvas exists.
       JUMP primary (Space) + DUCK (ArrowDown) + OK/pause util. Tapping the
       play area also jumps (runner convention) — wired inside game.js. -->
  <script src="src/touch-controls.js"></script>
  <script>
    (function () {
      'use strict';
      function boot() {
        if (typeof TouchControls === 'undefined') return;
        TouchControls.init({
          canvas: document.getElementById('game'),
          dpad: false,
          buttons: [
            { label: 'JUMP', keys: [' '], color: '#5fae3e' },
            { label: 'DUCK', keys: ['ArrowDown'], color: '#d98a3e' },
            { label: 'OK', keys: ['Enter'], color: '#2a7fa7', util: true },
            { label: 'II', keys: ['p'], color: '#445', util: true }
          ]
        });
      }
      if (document.readyState === 'complete') boot();
      else window.addEventListener('load', boot);
    })();
  </script>
</body>
</html>
