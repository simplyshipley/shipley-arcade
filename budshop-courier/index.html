<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>📦 Budshop Courier</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#15110e" />
<meta name="description" content="Budshop Courier — a Paperboy-style delivery ride for onlinebudshop.com. Toss the package onto the porch, dodge the street." />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0c0a08;
    color: #e8dcc4;
    font-family: ui-monospace, Menlo, monospace;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  /* Dark letterbox stage; the canvas scales to fit while keeping 540x720. */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(120% 80% at 50% 0%, #1d1830 0%, #0c0a08 70%);
  }
  #game {
    display: block;
    width: auto;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
    aspect-ratio: 540 / 720;
    background: #11131a;
    image-rendering: auto;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 0 0 3px #1d1d28, 0 18px 60px rgba(0, 0, 0, 0.6);
  }
  /* Portrait phones: fill width instead of height. */
  @media (max-aspect-ratio: 540/720) {
    #game { width: 100vw; height: auto; }
  }
  .hint {
    position: fixed;
    left: 0; right: 0; bottom: 4px;
    text-align: center;
    font-size: 11px;
    color: #6a6450;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="540" height="720"></canvas>
  </div>
  <div class="hint">STEER ← → / A D / drag · TOSS Space / tap · P pause · R restart</div>

  <!-- Logic core + route data first, then the shell, then the touch layer.
       game.js carries an inline fallback mirroring the core/route seam, so it
       boots even if core.js / route.js have not loaded (parallel build). -->
  <script src="src/core.js"></script>
  <script src="src/route.js"></script>
  <script src="src/game.js"></script>
  <script src="src/touch-controls.js"></script>
  <script>
    // NES touch layer: big TOSS (primary), a steer d-pad (← →), and small
    // utility chips (OK advances screens, II pauses). touch-controls maps each
    // button to the exact keys the shell already listens for on window.
    (function () {
      if (!window.TouchControls) return;
      window.TouchControls.init({
        canvas: document.getElementById('game'),
        dpad: true,                                   // arrow-key steer d-pad
        buttons: [
          { label: 'TOSS', keys: [' '], color: '#5fae3e' },   // primary action
          { label: 'OK', keys: ['Enter'], color: '#445', util: true },
          { label: 'II', keys: ['p'], color: '#445', util: true }
        ]
      });
    })();
  </script>
</body>
</html>
