<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Stormwing Express</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #06070d; /* dark letterbox */
      color: #8b93a7;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    canvas {
      background: #0a0d1f;
      box-shadow: 0 0 64px rgba(42, 167, 160, 0.16);
      max-width: 100vw;
      max-height: calc(100vh - 60px);
      touch-action: none;
    }
    /* On short/landscape phones the footer hint just wastes vertical room. */
    @media (max-height: 480px) { footer { display: none; } }
    footer {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #5a6f8c;
      user-select: none;
    }
    footer b { color: #d9b36a; font-weight: 700; }
  </style>
  <link rel="icon" type="image/png" href="../logos/stormwing-express-icon.png">
  <link rel="apple-touch-icon" href="../logos/stormwing-express-icon.png">
</head>
<body>
  <canvas id="game" width="960" height="600"></canvas>
  <footer><b>SPACE/Z</b> flap &middot; <b>ARROWS/WASD</b> steer &middot; <b>X</b> sling &middot; <b>&darr;+X</b> drop &middot; <b>P</b> pause</footer>
  <!-- CONTRACT.md load order -->
  <script src="src/core.js"></script>
  <script src="src/core/physics.js"></script>
  <script src="src/core/projectiles.js"></script>
  <script src="src/core/collision.js"></script>
  <script src="src/core/meter.js"></script>
  <script src="src/core/score.js"></script>
  <script src="src/core/spawner.js"></script>
  <script src="src/core/stageMachine.js"></script>
  <script src="src/engine.js"></script>
  <script src="src/stages/gale-run.js"></script>
  <script src="src/stages/switchback-post.js"></script>
  <script src="src/stages/spire-ascent.js"></script>
  <script src="src/stages/storm-roc.js"></script>
  <script src="src/game.js"></script>
  <script src="src/touch-controls.js"></script>
  <script>
    // Mobile: on-screen controls synthesize the same keys the game listens for.
    TouchControls.init({
      canvas: document.getElementById('game'),
      dpad: true,
      buttons: [
        { label: 'FLAP', keys: [' '], color: '#2aa7a0' },
        { label: 'SLING', keys: ['x'], color: '#d9b36a' },
        { label: 'DROP', keys: ['ArrowDown', 'x'], color: '#8c5a9e' },
        { label: '⏸', keys: ['p'], color: '#556', util: true },
        { label: 'OK', keys: ['Enter'], color: '#556', util: true },
      ],
    });
  </script>
</body>
</html>
