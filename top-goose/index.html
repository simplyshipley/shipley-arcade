<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c1018">
<title>TOP GOOSE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #06080d;
    overflow: hidden;
    overscroll-behavior: none;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Portrait flight-sim canvas: 480x800. Scales to fit the screen on
     phones, sits tall on desktop. Dark letterbox via the giant box-shadow.
     touch-action:none so drag-to-fly + the d-pad never trigger native
     scroll/zoom. */
  #game {
    display: block;
    touch-action: none;
    background: #0c1018;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    image-rendering: optimizeQuality;
    box-shadow: 0 0 0 9999px #06080d;
  }
</style>
  <link rel="icon" type="image/png" href="../logos/top-goose-icon.png">
  <link rel="apple-touch-icon" href="../logos/top-goose-icon.png">
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="480" height="800"></canvas>
  </div>
  <!-- ENGINE (sibling builder): pure rules + pseudo-3D math, no DOM. Exposes
       window.TGCore (project/buildCamera/scoreForDrop/ScoreKeeper/Health/
       makeRng/depthSort + config), window.TGBird (flight model), and
       window.TGWorld (seeded course/spawner, biomes, per-mode rules).
       core.js first; bird.js + world.js read window.TGCore. -->
  <script src="src/core.js"></script>
  <script src="src/bird.js"></script>
  <script src="src/world.js"></script>
  <!-- SHELL: pseudo-3D renderer + input + screens (consumes core.project). -->
  <script src="src/game.js"></script>
  <!-- MOBILE: vendored control layer. Init AFTER game.js so the canvas exists.
       d-pad = bank/pitch steer, POOP primary, VIEW cycles camera, OK/pause util. -->
  <script src="src/touch-controls.js"></script>
  <script>
    (function () {
      'use strict';
      function boot() {
        if (!window.TouchControls) return;
        TouchControls.init({
          canvas: document.getElementById('game'),
          dpad: true,
          buttons: [
            { label: 'POOP', keys: [' '], color: '#8c5a9e' },
            { label: 'VIEW', keys: ['c'], color: '#2a7fa7' },
            { label: 'OK', keys: ['Enter'], color: '#2aa77a', util: true },
            { label: 'II', keys: ['p'], color: '#445', util: true }
          ]
        });
      }
      if (document.readyState === 'complete') boot();
      else window.addEventListener('load', boot);
    })();
  </script>
</body>
</html>
