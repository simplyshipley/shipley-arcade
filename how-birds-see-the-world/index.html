<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7ec8e3">
<title>How Birds See The World</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #20232e;
    overflow: hidden;
    overscroll-behavior: none;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Portrait vertical scroller: 540x900. Scales to fit the screen on
     phones, sits tall on desktop. touch-action:none so drag-to-fly and
     the d-pad never trigger native scroll/zoom. */
  #game {
    display: block;
    touch-action: none;
    background: #7ec8e3;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    image-rendering: optimizeQuality;
    box-shadow: 0 0 0 9999px #20232e;
  }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="540" height="900"></canvas>
  </div>
  <!-- LOGIC (sibling builder): pure rules, no DOM. Exposes window.HBCore (incl.
       Health) + window.Targets + window.Hazards + window.Terrain. core.js
       first (the shell passes the roster explicitly, so it needs no global
       Targets at load); hazards.js + terrain.js read window.HBCore. -->
  <script src="src/core.js"></script>
  <script src="src/targets.js"></script>
  <script src="src/hazards.js"></script>
  <script src="src/terrain.js"></script>
  <!-- SHELL: renderer + input + screens (richer v2 world, the dodge layer). -->
  <script src="src/game.js"></script>
  <!-- MOBILE: vendored control layer. Init AFTER game.js so the canvas exists. -->
  <script src="src/touch-controls.js"></script>
  <script>
    (function () {
      'use strict';
      function boot() {
        if (!window.TouchControls) return;
        TouchControls.init({
          canvas: document.getElementById('game'),
          dpad: true,
          buttons: [
            { label: 'POOP', keys: [' '], color: '#8c5a9e' },
            { label: 'OK', keys: ['Enter'], color: '#2aa7a0', util: true },
            { label: 'II', keys: ['p'], color: '#445', util: true }
          ]
        });
      }
      if (document.readyState === 'complete') boot();
      else window.addEventListener('load', boot);
    })();
  </script>
</body>
</html>
